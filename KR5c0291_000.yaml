front:
  text: 九轉靈砂大丹
  hash: sha256:59d85527986624109ad3efb03ad1eca9c2537835fef0ce7060243c72f99fcdf7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0291_HFL_000-001a, image: hfl/0587/0587-018.png}
body:
  text: 炒靈砂法用水銀一斤硫黃四兩右用新鐡鍋一口用水洗淨火盆一箇放小磚三塊架起鐵鍋鍋底用少炭火逼熱先用黃蠟擦令鍋潤鐵鏟亦烘熱用蠟擦潤先下硫黃熔成汁次下水銀兩人對坐鉗住鍋邊用鐵鏟不住手炒如有黃烟起時即用米醋灑之烟止再炒如結成取下用栁木槌擂碎或入碾碾細再擡上鍋炒令青磚色為度約炒三箇時辰炒得熟時升砂堅固如此鏟出入碾細羅過起名青金頭末造爐法先擇陽日用土磚十餘箇砌爐一座髙二尺上圓下方著底用木板爐中約盛炭五斤為凖爐內髙一尺五寸下用鐵條七根作隔眼隔下髙五寸作風門泥之候乾方用鑄鼎法用生鐵造水火鼎一付通髙一尺二寸火鼎髙八寸內子口徑過五寸邊連子口濶一尺火鼎底厚五分水鼎髙四寸水鼎底厚二分用大治爐中鐵汁鑄造水火鼎子口縫要合得升砂法先用大鍋內入黃泥并水就放水火鼎在鍋內煮滚約三箇時辰取出再以水洗淨烘乾用米醋磨墨以筆蘸墨塗火鼎內并水鼎底再用石斛并艾葉燒烟薰之隔鐵氣候冷放穩却將前青金頭末以匙輕挑入火鼎中令虛不可滿約離水鼎底三指為凖醋調赤石脂封子口坐上水鼎按實用鐵線串水火鼎上下眼緊札定外子口再用六乙鹽泥固濟一寸厚用粗鐵線條作鈎長一尺五寸火鼎邊眼內鈎起上用麻索一條繫定懸掛於爐上爐內先以成塊硬炭五斤排砌於內下用引火四兩擇日早辰起火以扇去風門口搧之先文後武如炭軟加一二斤水鼎內先下溫湯八分滚時常以冷水抽添不要滚出漸漸放鼎近火看爐內火盡為度約有半日隔一夜寒爐取出鏟去土鑿開其靈砂升於水鼎底取出包起煮砂法將靈砂一斤或二斤鑿成大黃豆塊以淨細麻布縫一長袋將磈砂傾入袋中線札住袋口不要動用大磁瓶一箇約盛五升湯者將桑柴不問多少於淨處燒灰放冷量灰一斗籮底先用夏布一層放上灰先用滚湯澆濕每灰一斗用冷水二斗旋傾入籮內淋之寧水少些汁稠為妙取汁傾入瓶中放在火盆內用炭火煨滚却將前袋中砂懸掛在瓶內居中謂之懸胎用慢火煨如蟹眼滚煮七伏時日足再滾二三滚取出曬乾謂之困法做銀珠子法約用花銀二十兩再用黑鉛灰池煎過十分淨徹入甘鍋內化成汁用新竹梢一把連葉札成帚橫放在大磁缸內將銀汁細傾於帚上急擺動其銀成粟米細珠如大者再化再傾揀取細珠用更好一轉初真丹法右用生鐵鑄盒子一箇或熟鐵打盒子亦可一盒約盛銀珠二十兩先用白善土米醋調塗盒子內一分厚日乾却將前珠子一斤并煮過靈砂四兩每用四一之數如栽蓮子法層間滿合以崑崙紙蓋定盒頂不滿用乾碎黃土填實用醋調赤石脂封子口蓋住用鐵線十字札定合子外用紙筋鹽泥通固約半指厚日乾入灰缸內養火又用小口缸一箇約盛灰九斗者用黃土先鋪缸底三寸厚用三腳小鐵架一箇髙五寸三腳仰放向上將丹合放於三腳上頂住不要側動以紙錢灰埋之再用大鐵架罩定其架圈上以鐵線串成隔眼其隔離丹合一指隔上放火再用五寸灰蓋火卯酉抽添二七伏時二三四五六七八皆是兩數候日足冷定取出開合其砂如新鐵色將一塊用刀劈開中間無紅色其丹熟如有些紅色是换火不勻不可動再固濟依前養三伏時其火比前火加些無不成矣揀出銀珠分開如要此砂見寶用砂一兩黑鉛一兩入灰池對煎過每兩砂得真銀八錢惜之留轉大藥二轉正陽丹法右用初真丹一十六兩作匱依前用桑汁煮過靈砂一斤先用四兩同丹匱依前入合如種蓮子法四一之數層間滿盒依前固濟日乾入灰缸內三腳上依前罩定依前下火卯酉抽添一七伏時二三四五六七八皆用兩數日足候冷取出其新砂與丹匱一般㨂出新砂包起再用煮砂四兩依前入匱中依前封固入缸內養之如此四次共得一斤新砂如要試丹成熟依前用黑鉛煎之每兩砂得銀八錢如不煎用留作丹匱轉丹藥舊匱任意用之三轉絶真丹法右用正陽丹一十六兩作匱用不曾煮的靈砂一十二兩同透明辰砂四兩共入麻布袋中入桑灰汁瓶內依前煮七伏時候日足一滚取出日乾同入研細羅過用玉女漿即楮樹汁也為劑按實曬乾鑿成大黃豆塊先用膽礬四錢硫黃一錢研細同入銚內炒令紫色研為細末却將鑿成塊砂四兩逐塊用熟米醋燕過去膽礬硫黃末中滚之名貼身藥與丹匱依前四一之數層間滿盒固濟入灰缸內三腳上依前單定依前下火卯酉抽添二七伏時二三四五六七八皆兩數日足候冷取出開合其砂亦如新鐵色母子一般㨂出如此四次共收得新砂一斤如見寶依前試之舊母任意用之四轉妙靈丹法右用絶真丹一十六兩捶碎用磁合一箇揩淨將碎砂鋪於合內用閉口川椒一兩淨水三碗於磁器中煮至二碗去柤乾淨却傾入水銀四兩煮滚約一時候取下急傾去椒汁令乾將水銀乘熱傾入合內砂中醋調赤石脂封子口鐵線札定合外以紙筋鹽泥通固日乾合底下用水湯瓶一箇約盛水五升瓶口與合底一般恰好瓶中先盛滚湯七分坐上丹合鹽泥固濟口縫不用三腳入缸內灰埋之單定養三伏時卯酉抽添四五六兩數日足寒爐取出開合看其水銀不見稱砂有斤兩不要動再依前煮水銀四兩依前澆入合內砂中封子口扎定依前固濟日乾水瓶內添滚湯七分坐上丹合固口縫入缸內依前下火依前抽添三伏時候冷取出開合微見些峯角稱砂亦有斤兩如此四次共澆水銀一斤且住休動固法如前水瓶內湯添滿坐上合依前封固子口不澆水銀虛養五伏時卯酉抽添四五六七八兩數日足冷取出開合其丹湧起如瓊林玉樹方可採摘白芽子如此澆採無窮也五轉水仙丹法右用妙靈丹內採丹芽一斤要淨不可犯雜鋪於淨磁合內好珠汞半斤就傾入合內芽中依前封固子口扎定合下用湯瓶依前封固入灰缸內不用罩其火四方插養五伏時四五六七八兩數日足候冷取出開合其丹峯巒湧起休動依前再澆水銀依前固養如滿合用剪下分開如要成寶以河水并乳香少許煮一伏時入甘鍋內熔成至寶任用之至此不用鉛煎自體成寶矣六轉通玄丹法右用水仙丹取四兩依前用河水并乳香煮過熔成寶打造室合三兩做底一兩做蓋口縫彌密恰好盛葉雌透雄倭黃紫𥐻各一兩皆用精妙者同研細裝於合內醋調赤石脂封子口放於前磁合內居中却將水仙丹芽子鋪蓋再固磁合子口扎定不用外固入灰缸內三腳上灰埋罩定隔上放火卯酉抽添三七伏時二三四五六七八皆兩數日足候冷取出開合去鋪蓋其室合與三黃一等紫紅將黃一小塊試銀成庚通赤為度如上面赤下淡其丹未熟如透底赤方可點化留轉丹藥七轉寶神丹法右用不煮靈砂六兩生雄黃二兩用前養過三黃四兩留一兩蓋面餘一處研勻入磁合內留丹一兩亦研細蓋面以醋調赤石脂固子口鐵線十字扎定合外再以紙筋鹽泥通固日乾入灰缸內三腳上灰埋之罩定隔上披火五七伏時卯酉抽添二三四五六七八兩數候日足再加火三斤四方插煅候冷取出試之將汞五兩入建盞內以丹末一錢摻之下用小火逼汞將却好盞蓋定醋紙封子口候作聲聲絶去盞其汞成一塊紫庚再入甘鍋內化成金寶留轉大藥舊匱任用之八轉神寶丹法右用寶神丹七兩留二兩塗頭用硫黃汞對升的靈砂五兩雌雄硫珠各一兩並研細入合留丹二兩亦研細蓋於面上固濟日乾入灰缸內三腳上卯酉抽添七七伏時二三四五六七八兩數日足候冷開合成一塊紫色射目光彩可愛可種金芽變轉任用留轉大藥九轉登真丹法右用神寶丹六十兩二八靈砂三十兩一處研勻用鳥驢乳汁和為劑却摘取金芽二斤熔成寶打造金神室合恰好盛衆丹藥在內令滿醋調赤石脂封子口復鑄一銅合一箇比度大小恰好入室合居中四邊各寬一指右用鉛丹礬石各另用器盛之五斤炭火煆過同研細末殺埋芽合鋪蓋要勻次固濟銅合不用外固入灰池右擇卜壇場按方位擇日時下火卯酉抽添七七伏時依前火數日足就加火三斤四方插煅候冷盡取合子去銅合以黃芽丹合盛大丹於壇上掘地深五尺埋五十日取出用油紙褁三五重再以布帛包三五層淨麻索携墜於井中五十日至底取出為細末以黃精自然汁或玉女汁亦可丸如雞頭子大候乾再入金室合內封子口灰缸內三腳上下火一七伏時卯酉抽添二三四五六七八兩數日足候冷取出合試丹一粒投入冷水中其水隨丹滚如湯以汞一斤入建盞內投丹一粒恰好盞蓋定醋紙搭口縫以小火逼汞如秋蟬之聲聲絶去盞汞以成上色紫寶熔之紫暈爍人乃丹成也將丹數供具奏上帝候有報應取丹井中水吞三粒先置水缸遂入水缸中煩丹友外護候水溫熱即出再入第二缸水中復三缸便覺身輕神變次日凖前如是三次九缸水共吞九粒自然身有光明將見雲車下迎如接侍雲升霞車矣又澆淋法用恰好磁合一箇將初真丹一斤先用長流水於磁器內慢火煮浴一時微滚取出日乾鋪於盒內却用川椒一兩多㨂閉口者好以磁瓶內用淨水三碗煎至二碗去柤却傾入水銀四兩再煮一時急去椒湯用紙拭乾將淨水銀乘熱傾入盒內丹中用崑崙紙蓋定又用土塊填滿依前固濟日乾合下用水湯瓶一箇瓶口與合底恰好其瓶盛水三升者瓶內先下滚湯七分瓶口用鹽泥一條圈住將盒坐在鹽泥上塗固口縫入灰缸內不用下三腳只罩定用頂火養三伏時卯酉抽添四五六兩數日足候冷取出開盒看時不見其水銀盡入砂中稱斤兩方有不要動依前再澆固濟如此四次每次添湯瓶七分為凖乘熱坐上盒子為妙四次後用虛養一次虛養時水瓶內添湯滿其盒依前封固坐在湯瓶上不用罩四邊插火養五伏時卯酉抽添四五六七八兩數日足候冷取出開盒看方可摘些芽放炭火上試熔看冷成珠不折方好有走折再虛養一次如要成寶不用鉛煎用甘鍋化成寶如要轉澆盒滿分之依前四一之數澆養每四次用一虛養試看成寶方可再澆如芽嫩切不可澆淋依前再虛養務要成珠方可轉澆去九轉靈砂大丹
