front:
  text: 九轉靈砂大丹
  hash: sha256:59d85527986624109ad3efb03ad1eca9c2537835fef0ce7060243c72f99fcdf7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0291_HFL_000-001a, image: hfl/0587/0587-018.png}
body:
  text: 炒靈砂法用水銀一斤硫黄四兩右用新鐡鍋一口用水洗淨火盆一箇放小磚三塊架起鐵鍋鍋底用少炭火逼熱先用黄蠟擦令鍋潤鐵鏟亦烘熱用蠟擦潤先下硫黄熔成汁次下水銀兩人對坐鉗住鍋邊用鐵鏟不住手炒如有黄烟起時即用米醋洒之烟止再炒如結成取下用栁木槌擂碎或入碾碾細再擡上鍋炒令青磚色爲度約炒三箇時辰炒得熟時昇砂堅固如此鏟出入碾細羅過起名青金頭末造爐法先擇陽日用土磚十餘箇砌爐一座髙二尺上圓下方著底用木板爐中約盛炭五斤爲凖爐内髙一尺五寸下用鐵條七根作隔眼隔下髙五寸作風門泥之候乾方用鑄鼎法用生鐵造水火鼎一付通髙一尺二寸火鼎髙八寸内子口徑過五寸邊連子口濶一尺火鼎底厚五分水鼎髙四寸水鼎底厚二分用大治爐中鐵汁鑄造水火鼎子口縫要合得昇砂法先用大鍋内入黄泥并水就放水火鼎在鍋内煑滚約三箇時辰取出再以水洗淨烘乾用米醋磨墨以筆蘸墨塗火鼎内并水鼎底再用石斛并艾葉燒烟薰之隔鐵氣候冷放穩却將前青金頭末以匙輕挑入火鼎中令虚不可滿約離水鼎底三指爲凖醋調赤石脂封子口坐上水鼎按實用鐵線串水火鼎上下眼緊札定外子口再用六乙塩泥固濟一寸厚用麤鐵線條作鈎長一尺五寸火鼎邊眼内鈎起上用麻索一條繫定懸掛於爐上爐内先以成塊硬炭五斤排砌於内下用引火四兩擇日早辰起火以扇去風門口搧之先文後武如炭軟加一二斤水鼎内先下温湯八分滚時常以冷水抽添不要滚出漸漸放鼎近火看爐内火盡爲度約有半日隔一夜寒爐取岀鏟去土鑿開其靈砂昇於水鼎底取出包起煑砂法將靈砂一斤或二斤鑿成大黄豆塊以淨細麻布縫一長袋將磈砂傾入袋中線札住袋口不要動用大磁瓶一箇約盛五升湯者將桑柴不問多少於淨處焼灰放冷量灰一斗籮底先用夏布一層放上灰先用滚湯澆濕每灰一斗用冷水二斗旋傾入籮内淋之寧水少些汁稠爲妙取汁傾入瓶中放在火盆內用炭火煨滚却將前袋中砂懸掛在瓶内居中謂之懸胎用慢火煨如蟹眼滚煑七伏時日足再滾二三滚取出曬乾謂之困法做銀珠子法約用花銀二十兩再用黑鉛灰池煎過十分淨徹入甘鍋内化成汁用新竹梢一把連葉札成箒橫放在大磁缸内將銀汁細傾於箒上急擺動其銀成粟米細珠如大者再化再傾揀取細珠用更好一轉初真丹法右用生鐵鑄盒子一箇或熟鐵打盒子亦可一盒約盛銀珠二十兩先用白善土米醋調塗盒子内一分厚日乾却將前珠子一斤并煑過靈砂四兩每用四一之數如㘽蓮子法層間滿合以崑崙紙蓋定盒頂不滿用乾碎黄土填實用醋調赤石脂封子口蓋住用鐵線十字札定合子外用紙筋塩泥通固約半指厚日乾入灰缸内養火又用小口缸一箇約盛灰九斗者用黃土先鋪缸底三寸厚用三脚小鐵架一箇髙五寸三脚仰放向上將丹合放於三脚上頂住不要側動以紙錢灰埋之再用大鐵架罩定其架圈上以鐵線串成隔眼其隔離丹合一指隔上放火再用五寸灰蓋火卯酉抽添二七伏時二三四五六七八皆是兩數候日足冷定取岀開合其砂如新鐵色將一塊用刀劈開中間無紅色其丹熟如有些紅色是换火不匀不可動再固濟依前養三伏時其火比前火加些無不成矣揀出銀珠分開如要此砂見寳用砂一兩黑鉛一兩入灰池對煎過每兩砂得真銀八錢惜之留轉大藥二轉正陽丹法右用初真丹一十六兩作匱依前用桑汁煑過靈砂一斤先用四兩同丹匱依前入合如種蓮子法四一之數層間滿盒依前固濟日乾入灰缸内三脚上依前罩定依前下火卯酉抽添一七伏時二三四五六七八皆用兩數日足候冷取岀其新砂與丹匱一般㨂出新砂包起再用煑砂四兩依前入匱中依前封固入缸內養之如此四次共得一斤新砂如要試丹成熟依前用黑鉛煎之每兩砂得銀八錢如不煎用留作丹匱轉丹藥舊匱任意用之三轉絶真丹法右用正陽丹一十六兩作匱用不曾煑的靈砂一十二兩同透明辰砂四兩共入麻布袋中入桑灰汁瓶內依前煑七伏時候日足一滚取出日乾同入研細羅過用玉女漿即楮樹汁也爲劑按實曬乾鑿成大黄豆塊先用膽礬四錢硫黄一錢研細同入銚內炒令紫色研爲細末却將鑿成塊砂四兩逐塊用熟米醋燕過去膽礬硫黄末中滚之名貼身藥與丹匱依前四一之數層間滿盒固濟入灰缸内三脚上依前單定依前下火卯酉抽添二七伏時二三四五六七八皆兩數日足候冷取出開合其砂亦如新鐵色母子一般㨂岀如此四次共收得新砂一斤如見寳依前試之舊母任意用之四轉妙靈丹法右用絶真丹一十六兩搥碎用磁合一箇揩淨將碎砂鋪於合内用閉口川椒一兩淨水三碗於磁器中煑至二碗去柤乾淨却傾入水銀四兩煑滚約一時候取下急傾去椒汁令乾將水銀乗熱傾入合内砂中醋調赤石脂封子口鐵線札定合外以紙筋塩泥通固日乾合底下用水湯瓶一箇約盛水五升瓶口與合底一般恰好瓶中先盛滚湯七分坐上丹合塩泥固濟口縫不用三脚入缸內灰埋之單定養三伏時卯酉抽添四五六兩數日足寒爐取岀開合看其水銀不見秤砂有斤兩不要動再依前煑水銀四兩依前澆入合内砂中封子口扎定依前固濟日乾水瓶内添滚湯七分坐上丹合固口縫入缸内依前下火依前抽添三伏時候冷取岀開合微見些峯角秤砂亦有斤兩如此四次共澆水銀一斤且住休動固法如前水瓶内湯添滿坐上合依前封固子口不澆水銀虚養五伏時卯酉抽添四五六七八兩數日足冷取岀開合其丹湧起如瓊林玉樹方可採摘白芽子如此澆採無窮也五轉水仙丹法右用妙靈丹内採丹芽一斤要淨不可犯雜鋪於淨磁合内好珠汞半斤就傾入合内芽中依前封固子口扎定合下用湯瓶依前封固入灰缸内不用罩其火四方揷養五伏時四五六七八兩數日足候冷取岀開合其丹峯巒湧起休動依前再澆水銀依前固養如滿合用剪下分開如要成寳以河水并乳香少許煑一伏時入甘鍋内熔成至寳任用之至此不用鉛煎自體成寳矣六轉通玄丹法右用水仙丹取四兩依前用河水并乳香煑過熔成寳打造室合三兩做底一兩做蓋口縫彌宻恰好盛葉雌透䧺倭黄紫𥐻各一兩皆用精妙者同研細装於合内醋調赤石脂封子口放於前磁合内居中却將水仙丹芽子鋪蓋再固磁合子口扎定不用外固入灰缸内三脚上灰埋罩定隔上放火卯酉抽添三七伏時二三四五六七八皆兩數日足候冷取出開合去鋪蓋其室合與三黄一等紫紅將黄一小塊試銀成庚通赤爲度如上面赤下淡其丹未熟如透底赤方可點化留轉丹藥七轉寳神丹法右用不煑靈砂六兩生䧺黄二兩用前養過三黃四兩留一兩蓋面餘一處研匀入磁合内留丹一兩亦研細蓋面以醋調赤石脂固子口鐵線十字扎定合外再以紙筋塩泥通固日乾入灰缸内三脚上灰埋之罩定隔上披火五七伏時卯酉抽添二三四五六七八兩數候日足再加火三斤四方揷煅候冷取出試之將汞五兩入建盞内以丹末一錢摻之下用小火逼汞將却好盞蓋定醋紙封子口候作聲聲絶去盞其汞成一塊紫庚再入甘鍋内化成金寳留轉大藥舊匱任用之八轉神寳丹法右用寳神丹七兩留二兩塗頭用硫黄汞對昇的靈砂五兩雌䧺硫珠各一兩並研細入合留丹二兩亦研細蓋於面上固濟日乾入灰缸内三脚上卯酉抽添七七伏時二三四五六七八兩數日足候冷開合成一塊紫色射目光彩可愛可種金芽變轉任用留轉大藥九轉登真丹法右用神寳丹六十兩二八靈砂三十兩一處研匀用鳥驢乳汁和爲劑却摘取金芽二斤熔成寳打造金神室合恰好盛衆丹藥在內令滿醋調赤石脂封子口復鑄一銅合一箇比度大小恰好入室合居中四邊各寛一指右用鉛丹礬石各另用器盛之五斤炭火煆過同研細末殺埋芽合鋪蓋要匀次固濟銅合不用外固入灰池右擇卜壇場按方位擇日時下火卯酉抽添七七伏時依前火數日足就加火三斤四方揷煅候冷盡取合子去銅合以黄芽丹合盛大丹於壇上掘地深五尺埋五十日取岀用油紙褁三五重再以布帛包三五層淨麻索携墜於井中五十日至底取出爲細末以黄精自然汁或玉女汁亦可丸如雞頭子大候乾再入金室合内封子口灰缸内三脚上下火一七伏時卯酉抽添二三四五六七八兩數日足候冷取岀合試丹一粒投入冷水中其水隨丹滚如湯以汞一斤入建盞内投丹一粒恰好盞蓋定醋紙搭口縫以小火逼汞如秋蟬之聲聲絶去盞汞以成上色紫寳熔之紫暈爍人乃丹成也將丹數供具奏上帝候有報應取丹井中水吞三粒先置水缸遂入水缸中煩丹友外護候水温熱即岀再入第二缸水中復三缸便覺身輕神變次日凖前如是三次九缸水共吞九粒自然身有光明將見雲車下迎如接侍雲昇霞車矣又澆淋法用恰好磁合一箇將初真丹一斤先用長流水於磁器内慢火煑浴一時微滚取出日乾鋪於盒內却用川椒一兩多㨂閉口者好以磁瓶内用淨水三碗煎至二碗去柤却傾入水銀四兩再煑一時急去椒湯用紙拭乾將淨水銀乗熱傾入盒内丹中用崑崙紙蓋定又用土塊填滿依前固濟日乾合下用水湯瓶一箇瓶口與合底恰好其瓶盛水三升者瓶內先下滚湯七分瓶口用塩泥一條圏住將盒坐在塩泥上塗固口縫入灰缸内不用下三脚只罩定用頂火養三伏時卯酉抽添四五六兩數日足候冷取出開盒看時不見其水銀盡入砂中秤斤兩方有不要動依前再澆固濟如此四次每次添湯瓶七分爲凖乗熱坐上盒子爲妙四次後用虛養一次虚養時水瓶内添湯滿其盒依前封固坐在湯瓶上不用罩四邊揷火養五伏時卯酉抽添四五六七八兩數日足候冷取出開盒看方可摘些芽放炭火上試熔看冷成珠不折方好有走折再虚養一次如要成寳不用鉛煎用甘鍋化成寳如要轉澆盒滿分之依前四一之數澆養每四次用一虚養試看成寳方可再澆如芽嫰切不可澆淋依前再虚養務要成珠方可轉澆去九轉靈砂大丹
